# AM62x SD/MMC RAW A/B layout shared with U-Boot.
device=/dev/mmcblk1
product=ti-am62x
layout-id=am62x-sd-ab-v1
boot-attempts=3
work-dir=/tmp

# Remote bootloader updates remain disabled because ROM always reads tiboot3_a.
allow-bootloader-update=false
require-signature=false
signature-key=

meta0-offset=0x00500000
meta0-size=0x00010000
meta1-offset=0x00510000
meta1-size=0x00010000
tiboot3_a-offset=0x00000000
tiboot3_a-size=0x00100000
tiboot3_b-offset=0x00700000
tiboot3_b-size=0x00100000
tispl_a-offset=0x00100000
tispl_a-size=0x00200000
tispl_b-offset=0x00800000
tispl_b-size=0x00200000
uboot_a-offset=0x00300000
uboot_a-size=0x00200000
uboot_b-offset=0x00a00000
uboot_b-size=0x00200000
kernel_a-offset=0x01000000
kernel_a-size=0x01800000
kernel_b-offset=0x02800000
kernel_b-size=0x01800000
rootfs_a-offset=0x04000000
rootfs_a-size=0x08000000
rootfs_b-offset=0x0c000000
rootfs_b-size=0x08000000
