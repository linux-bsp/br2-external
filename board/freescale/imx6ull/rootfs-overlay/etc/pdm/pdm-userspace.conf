# Runtime policy for user-owned PDM communication endpoints.
#
# Device Tree keeps only stable hardware topology and PDM discovery metadata.
# Product-specific CAN IDs, UART line policy, network peer addresses, timeouts,
# retries, heartbeat, and frame policy belong here or in the product daemon's
# own configuration store.

[mcu.can.3]
transport=can
# The board DTS exposes pdm,mcu-can reg=<3> and can-controller=<&can1>.
# The userspace backend may resolve the controller through /dev/pdm_manager;
# this interface name is kept as an explicit board runtime fallback.
interface=can0
tx_can_id=0x321
rx_can_id=0x322
rx_timeout_ms=500
extended_id=false
can_fd=false
can_fd_brs=false
retry_count=3

[mcu.uart.2]
transport=uart
# UART3 is routed to the board RS485 interface. On i.MX UART numbering this is
# normally /dev/ttymxc2; confirm on target with /proc/tty/driver/IMX-uart if
# aliases or probe order change.
device=/dev/ttymxc2
mode=rs485
baudrate=115200
parity=none
data_bits=8
stop_bits=1
rx_timeout_ms=100
frame_format=pdm-mcu-v1
retry_count=3

[mcu.net.0]
transport=net
protocol=udp
remote_ip=192.168.18.245
remote_port=5000
local_port=5001
rx_timeout_ms=100
heartbeat_ms=1000
retry_count=3
